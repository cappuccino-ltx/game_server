syntax = "proto3";

package mmo.login;

// 客户端 -> 登录服
message C2L_LoginReq {
  string account = 1;     // 账号
  string password = 2;    // 密码
  string token = 3;       // 上次登录的token（可选）
  string device = 4;      // 设备ID
}

// 登录服 -> 客户端
message L2C_LoginRsp {
  bool ok = 1;
  string player_id = 2;   // 玩家ID
  string token = 3;       // 登录token
  string gateway_ip = 4;  // 网关IP
  uint32 gateway_port = 5;
  string reason = 6;      // 失败原因
}