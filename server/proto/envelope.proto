syntax = "proto3";
package mmo.transport;

import "common.proto";

// 客户端链路消息头，承载通用路由与传输元信息。
message EnvelopeHeader {
  // 协议版本号，用于兼容控制。
  uint32 version = 1;
  // 命令字，按 message_id 规则编码。
  uint32 cmd = 2;
  // 客户端本地递增序号，用于去重和追踪。
  uint32 seq = 3;
  // 玩家 ID，登录后必填。
  uint64 player_id = 4;
  // 客户端发送时间戳，毫秒。
  uint32 timestamp_ms = 5;
  // 传输可靠性等级。
  mmo.common.QoS qos = 6;
}

// 客户端统一封包，body 存放具体业务 protobuf 二进制。
message Envelope {
  // 通用头部。
  EnvelopeHeader header = 1;
  // 业务消息序列化后的字节流。
  bytes body = 2;
}
