syntax = "proto3";
package mmo.state;

import "common.proto";

// 实体类型定义。
enum EntityType {
  // 未指定类型。
  ET_UNSPECIFIED = 0;
  // 玩家实体。
  PLAYER = 1;
  // NPC 实体。
  NPC = 2;
  // 怪物实体。
  MONSTER = 3;
}

enum EntityState {
  // 未指定状态。
  ES_UNSPECIFIED = 0;
  // 进入视野
  ES_IN_VIEW = 1;
  // 离开视野。
  ES_OUT_OF_VIEW = 2;
  // 更新状态。
  ES_UPDATE = 3;
  // 死亡状态。
  ES_DEAD = 4;
  // 存活状态。
  ES_ALIVE = 5;
}

// 通用属性键值对。
message Attribute {
  // 属性名。
  string key = 1;
  // 属性值。
  int64 value = 2;
}

// AOI 初次进入时的完整快照。
message EntitySnapshot {
  // 实体 ID。
  uint64 entity_id = 1;
  // 实体类型。
  EntityType type = 2;
  // 实体状态。
  EntityState state = 3;
  // 当前位置。
  mmo.common.QuantizedVector3 pos = 4;
  // 当前朝向。
  mmo.common.PackedLookAngles look = 5;
  // 属性快照列表。
  repeated Attribute attrs = 6;
}

// 帧同步中的实体增量。
message EntityDelta {
  // 实体 ID。
  uint64 entity_id = 1;
  // 位置是否变化。
  bool pos_changed = 2;
  // 新位置（当位置变化时有效）。
  mmo.common.QuantizedVector3 pos = 3;
  // 朝向是否变化。
  bool look_changed = 4;
  // 新朝向（当朝向变化时有效）。
  mmo.common.PackedLookAngles look = 5;
  // 变化的属性列表。
  repeated Attribute attrs = 6;
}


// 状态帧下发消息。
message S2C_StateFrame {
  // 当前帧的实体快照列表。
  repeated EntitySnapshot entities = 1;
  // 服务器帧号。
  uint32 frame = 2;
}
