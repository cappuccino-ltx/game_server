syntax = "proto3";
package mmo.common;

// 三维坐标，统一使用世界坐标系。
message Vector3 {
  // X 轴坐标。
  float x = 1;
  // Y 轴坐标。
  float y = 2;
  // Z 轴坐标。
  float z = 3;
}

// 欧拉角旋转信息。
message Rotation {
  // 偏航角。
  float yaw = 1;
  // 俯仰角。
  float pitch = 2;
  // 翻滚角。
  float roll = 3;
}

// 量化坐标，推荐用于高频同步（移动、状态帧）。
// 编码规则：真实坐标 = q / scale，默认 scale=100 表示厘米精度。
message QuantizedVector3 {
  // 量化后的 X 坐标，建议使用 sint32 以优化负数编码体积。
  sint32 x = 1;
  // 量化后的 Y 坐标，建议使用 sint32 以优化负数编码体积。
  sint32 y = 2;
  // 量化后的 Z 坐标，建议使用 sint32 以优化负数编码体积。
  sint32 z = 3;
  // 量化比例，100=厘米，10=分米。
  uint32 scale = 4;
}

// 量化朝向，推荐用于高频同步。
// yaw16 映射 [0,360)，pitch16 映射 [-90,90] 或项目定义范围。
// 打包后的朝向信息，通常由 yaw16 与 pitch16 组合为一个 uint32。
message PackedLookAngles {
  // 高16位 yaw、低16位 pitch 的打包值。
  uint32 packed = 1;
}

// 传输可靠性等级。
enum QoS {
  // 未指定，按默认可靠策略处理。
  QOS_UNSPECIFIED = 0;
  // 可靠消息，保证有序到达。
  RELIABLE = 1;
  // 不可靠消息，允许丢包。
  UNRELIABLE = 2;
}

// 玩家唯一标识包装类型。
message UserId {
  // 玩家唯一 ID。
  uint64 value = 1;
}

// 实体唯一标识包装类型。
message EntityId {
  // 实体唯一 ID。
  uint64 value = 1;
}

// 分区唯一标识包装类型。
message ZoneId {
  // Zone 编号。
  uint32 value = 1;
}


// 空消息，占位使用。
message Empty {}
