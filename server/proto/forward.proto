syntax = "proto3";
package mmo.transport;

// 网关内部路由头，服务间转发必须携带 player_id。
message RouteHeader {
  // 玩家 ID，转发的核心路由键。
  uint64 player_id = 1;
  // 会话 ID，用于定位具体连接会话。
  uint64 session_id = 2;
  // 网关实例 ID。
  uint32 gateway_id = 3;
  // 玩家当前所属 Zone。
  uint32 zone_id = 4;
  // 玩家当前所属 Battle 实例 ID。
  uint32 battle_id = 5;
  // 业务命令字。
  uint32 cmd = 6;
  // 链路追踪 ID，便于日志关联。
  uint64 trace_id = 7;
}

// 网关到其他服的单条转发消息。
message GatewayToServer {
  // 路由头信息。
  RouteHeader header = 1;
  // 业务消息体字节流。
  bytes body = 2;
}

// 其他服返回网关的单玩家消息项。
message ServerToGateway {
  // 目标玩家 ID。
  uint64 player_id = 1;
  // 业务命令字。
  uint32 cmd = 2;
  // 业务消息体字节流。
  bytes body = 3;
}

